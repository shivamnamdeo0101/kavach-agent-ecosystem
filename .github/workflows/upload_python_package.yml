name: Upload Python Packages

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build all packages
        run: |
          for pkg in kavach-logger kavach-mcp-events kavach-shield; do
            cd "$pkg"
            python -m build
            cd ..
          done

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: |
            kavach-logger/dist/
            kavach-mcp-events/dist/
            kavach-shield/dist/

  publish-logger:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/kavach-logger/${{ github.event.release.tag_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          packages-dir: dist/kavach-logger/dist
          pypi_token: ${{ secrets.PYPI_API_TOKEN }}

  publish-events:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/kavach-mcp-events/${{ github.event.release.tag_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          packages-dir: dist/kavach-mcp-events/dist
          pypi_token: ${{ secrets.PYPI_API_TOKEN }}

  publish-shield:
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/kavach-shield/${{ github.event.release.tag_name }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          packages-dir: dist/kavach-shield/dist
          pypi_token: ${{ secrets.PYPI_API_TOKEN }}
